apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: reputation-passport
  labels:
    app: nginx
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        tier: gateway
    spec:
      containers:
        - name: nginx
          image: ghcr.io/quantumworld-dpdns-io/nginx-pqc:latest
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https-pqc
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-certs
              mountPath: /etc/nginx/certs
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: nginx-certs
          secret:
            secretName: nginx-tls
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: reputation-passport
  labels:
    app: nginx
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      name: http
    - port: 443
      targetPort: 443
      name: https-pqc
  type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: reputation-passport
data:
  nginx.conf: |
    events { worker_connections 4096; }
    http {
      upstream kong { server kong:8000; }
      server {
        listen 80;
        location / { proxy_pass http://kong; }
        location /healthz { return 200 "healthy"; }
      }
    }
