# Nginx + PQC Reverse Proxy Configuration
# Built with OpenSSL 3.x + oqs-provider for post-quantum TLS

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$http_x_request_id",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":$upstream_status,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"tls_version":"$ssl_protocol",'
        '"tls_cipher":"$ssl_cipher"'
    '}';

    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # PQC TLS Configuration
    # Requires OpenSSL 3.x + oqs-provider
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Hybrid PQC key exchange: X25519 + ML-KEM-768
    ssl_ecdh_curve X25519MLKEM768:X25519:MLKEM768;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # PQC cipher suites (hybrid + classical fallback)
    ssl_ciphers "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256";

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Upstream backends
    upstream kong_gateway {
        least_conn;
        server kong:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream go_api {
        least_conn;
        server go-api:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream python_ai {
        least_conn;
        server python-ai:8082 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream rust_data {
        least_conn;
        server rust-data:8081 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream quantum_svc {
        least_conn;
        server quantum:8084 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server with PQC
    server {
        listen 443 ssl http2;
        server_name _;

        # PQC dual-stack certificates
        ssl_certificate     /etc/nginx/certs/server-rsa.crt;
        ssl_certificate_key /etc/nginx/certs/server-rsa.key;
        ssl_certificate     /etc/nginx/certs/server-pqc.crt;
        ssl_certificate_key /etc/nginx/certs/server-pqc.key;

        # PQC client certificate verification
        ssl_client_certificate /etc/nginx/certs/ca-pqc.crt;
        ssl_verify_client optional;

        # Route to Kong AI Gateway (primary)
        location /api/ {
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-TLS-Version $ssl_protocol;
            proxy_set_header X-TLS-Cipher $ssl_cipher;
            proxy_set_header X-PQC-Verified $ssl_client_verify;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Direct route to Go API (bypass Kong for internal)
        location /api/v1/internal/ {
            proxy_pass http://go_api/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $http_x_request_id;
            internal;
        }

        # WebSocket support (real-time notifications)
        location /ws/ {
            proxy_pass http://go_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # gRPC passthrough
        location /grpc/ {
            grpc_pass grpc://go_api;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
        }

        # Health check endpoint
        location /healthz {
            proxy_pass http://go_api/healthz;
            access_log off;
        }
    }
}
