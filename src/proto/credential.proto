syntax = "proto3";

package reputation.v1;

option go_package = "github.com/quantumworld-dpdns-io/adult-creator-reputation-passport/proto/credential/v1;credentialv1";

service CredentialService {
    rpc IssueCredential(IssueCredentialRequest) returns (IssueCredentialResponse);
    rpc VerifyCredential(VerifyCredentialRequest) returns (VerifyCredentialResponse);
    rpc RevokeCredential(RevokeCredentialRequest) returns (RevokeCredentialResponse);
    rpc GetCredential(GetCredentialRequest) returns (GetCredentialResponse);
    rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);
}

message Credential {
    string id = 1;
    string issuer_id = 2;
    string subject_hash = 3;
    string credential_type = 4;
    map<string, string> attributes = 5;
    int64 issued_at = 6;
    int64 expires_at = 7;
    bool revoked = 8;
    string signature = 9;
    string pqc_signature = 10;
}

message IssueCredentialRequest {
    string issuer_id = 1;
    string subject_hash = 2;
    string credential_type = 3;
    map<string, string> attributes = 4;
    int64 expires_at = 5;
}

message IssueCredentialResponse {
    Credential credential = 1;
    string tx_hash = 2;
}

message VerifyCredentialRequest {
    string credential_id = 1;
    string subject_hash = 2;
}

message VerifyCredentialResponse {
    bool valid = 1;
    string reason = 2;
    Credential credential = 3;
}

message RevokeCredentialRequest {
    string credential_id = 1;
    string reason = 2;
    string authorized_by = 3;
}

message RevokeCredentialResponse {
    bool success = 1;
    int64 revoked_at = 2;
    string tx_hash = 3;
}

message GetCredentialRequest {
    string credential_id = 1;
}

message GetCredentialResponse {
    Credential credential = 1;
}

message ListCredentialsRequest {
    string subject_hash = 1;
    int32 page_size = 2;
    string page_token = 3;
}

message ListCredentialsResponse {
    repeated Credential credentials = 1;
    string next_page_token = 2;
    int32 total_count = 3;
}
