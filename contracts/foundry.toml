[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
via_ir = true

remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
]

[profile.default.fuzz]
runs = 10000

[profile.default.invariant]
runs = 1000
depth = 50
