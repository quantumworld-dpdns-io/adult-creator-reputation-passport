version: "3.9"

x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"
  driver: json-file

networks:
  frontend:
    driver: overlay
  backend:
    driver: overlay
  data:
    driver: overlay

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  nginx:
    image: ghcr.io/quantumworld-dpdns-io/nginx-pqc:latest
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    networks:
      - frontend
      - backend
    deploy:
      mode: replicated
      replicas: 3
      placement:
        constraints: [node.role == worker]
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      health_check:
        test: ["CMD", "curl", "-f", "http://localhost/healthz"]

  kong:
    image: kong:3.8
    networks:
      - frontend
      - backend
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PLUGINS: "bundled,ai-proxy"
    configs:
      - source: kong_config
        target: /etc/kong/kong.yml
    deploy:
      replicas: 2

  go-api:
    image: ghcr.io/quantumworld-dpdns-io/go-api:latest
    networks:
      - backend
    environment:
      GO_API_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_DB: reputation_passport
      REDIS_HOST: redis
    secrets:
      - postgres_password
      - jwt_secret
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1"
          memory: 512M

  rust-data:
    image: ghcr.io/quantumworld-dpdns-io/rust-data:latest
    networks:
      - backend
      - data
    deploy:
      replicas: 3

  python-ai:
    image: ghcr.io/quantumworld-dpdns-io/python-ai:latest
    networks:
      - backend
    deploy:
      replicas: 2
      resources:
        reservations:
          memory: 1G

  postgres:
    image: postgres:16-alpine
    networks:
      - data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: reputation_passport
      POSTGRES_USER: postgres
    secrets:
      - postgres_password
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.labels.data == true]

  redis:
    image: redis:7-alpine
    networks:
      - data
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1

  prometheus:
    image: prom/prometheus:latest
    networks:
      - backend
      - data
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    deploy:
      replicas: 1

configs:
  kong_config:
    file: ./kong/kong.yml
  prometheus_config:
    file: ./prometheus/prometheus.yml

secrets:
  postgres_password:
    external: true
  jwt_secret:
    external: true
